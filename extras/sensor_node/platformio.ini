; FrankenChan ESP-NOW sensor node — one source, several chips.
; CI builds every env and the web flasher offers them all.

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
build_flags = -DCORE_DEBUG_LEVEL=1

; classic ESP32 (M5 Atom / Atom Lite / most devkits)
[env:node-esp32]
extends = env
board = esp32dev

; ESP32-S3 (M5 AtomS3 / AtomS3 Lite / S3 devkits)
[env:node-s3]
extends = env
board = esp32-s3-devkitc-1

; ESP32-C3 (M5 Stamp C3 / C3 devkits)
[env:node-c3]
extends = env
board = esp32-c3-devkitm-1
