; FrankenChan — custom firmware for the official M5Stack StackChan (K151, CoreS3)
; Build:  pio run
; Flash:  pio run -t upload   (or use the web flasher in /flasher)

[env:stackchan]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
board_build.partitions = default_16MB.csv
board_build.flash_size = 16MB
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DFC_ENABLE_CAMERA=1
    -std=gnu++17
build_unflags = -std=gnu++11
lib_deps =
    m5stack/M5Unified@^0.2.13
    m5stack/M5GFX@^0.2.25
    meganetaaan/M5Stack-Avatar@^0.10.0
    bblanchon/ArduinoJson@^7.4.2
    crankyoldgit/IRremoteESP8266@^2.9.0   ; 2.9.0 adds Arduino-ESP32 core 3.x support
    knolleary/PubSubClient@^2.8
    m5stack/M5UnitUnified@^0.5.0
    m5stack/M5Unit-NFC@^0.1.0
